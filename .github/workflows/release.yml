name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, e.g. v0.0.1-beta"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: compute changelog since previous tag
        id: changelog
        shell: bash
        run: |
          set -e
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ env.RELEASE_TAG }}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            COMMITS="- première version publique 🐙"
            DIFF_URL=""
          else
            COMMITS=$(git log "$PREV_TAG..${{ env.RELEASE_TAG }}" --pretty=format:'- %s' --no-merges --reverse)
            if [ -z "$COMMITS" ]; then
              COMMITS="- (aucun changement depuis $PREV_TAG — bump de version uniquement)"
            fi
            DIFF_URL="diff complet : https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ env.RELEASE_TAG }}"
          fi
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "COMMITS<<COMMITS_EOF"
            echo "$COMMITS"
            echo "COMMITS_EOF"
            echo "DIFF_URL=$DIFF_URL"
          } >> "$GITHUB_OUTPUT"

      - name: resolve release body
        id: release_body
        shell: bash
        env:
          COMMITS: ${{ steps.changelog.outputs.COMMITS }}
          DIFF_URL: ${{ steps.changelog.outputs.DIFF_URL }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          set -e
          NOTES_FILE="docs/release-notes/${TAG_NAME}.md"
          {
            echo "BODY<<BODY_EOF"
            if [ -f "$NOTES_FILE" ]; then
              cat "$NOTES_FILE"
            else
              printf '# AZprose %s\n\n' "$TAG_NAME"
              printf '## Changements\n\n%s\n\n%s\n\n' "$COMMITS" "$DIFF_URL"
              printf '## Installation\n\n'
              printf '**macOS Apple Silicon** : `AZprose.dmg`\n'
              printf '**macOS Intel** : `AZprose_intel.dmg`\n'
              printf '**Windows** : `AZprose_*-setup.exe`\n'
              printf '**Linux** : `.AppImage`, `.deb` ou `.rpm`\n'
            fi
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      - name: install linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: install dependencies
        run: bun install

      - name: disable updater artifacts for unsigned build
        if: env.HAS_TAURI_SIGNING_KEY != 'true'
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
          "

      - name: import apple cert (macOS only)
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12
          {
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: build + release (signed)
        if: env.HAS_TAURI_SIGNING_KEY == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "AZprose ${{ env.RELEASE_TAG }}"
          releaseBody: ${{ steps.release_body.outputs.BODY }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: build + release (unsigned)
        if: env.HAS_TAURI_SIGNING_KEY != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "AZprose ${{ env.RELEASE_TAG }}"
          releaseBody: ${{ steps.release_body.outputs.BODY }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: rename dmg → AZprose.dmg (Apple Silicon)
        if: matrix.target == 'aarch64-apple-darwin' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.tag_name == "${{ env.RELEASE_TAG }}") | .id' | head -1)
          [ -z "$RELEASE_ID" ] && { echo "no release found — skipping rename"; exit 0; }
          ASSET_ID=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | select(.name | test("aarch64.*\\.dmg$")) | .id' | head -1)
          if [ -n "$ASSET_ID" ]; then
            EXISTING=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | select(.name == "AZprose.dmg") | .id' | head -1)
            [ -n "$EXISTING" ] && gh api "repos/${{ github.repository }}/releases/assets/$EXISTING" -X DELETE
            gh api "repos/${{ github.repository }}/releases/assets/$ASSET_ID" -X PATCH -f name='AZprose.dmg'
          fi

      - name: rename dmg → AZprose_intel.dmg (Intel)
        if: matrix.target == 'x86_64-apple-darwin' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.tag_name == "${{ env.RELEASE_TAG }}") | .id' | head -1)
          [ -z "$RELEASE_ID" ] && { echo "no release found — skipping rename"; exit 0; }
          ASSET_ID=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | select(.name | test("x64.*\\.dmg$")) | .id' | head -1)
          if [ -n "$ASSET_ID" ]; then
            EXISTING=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | select(.name == "AZprose_intel.dmg") | .id' | head -1)
            [ -n "$EXISTING" ] && gh api "repos/${{ github.repository }}/releases/assets/$EXISTING" -X DELETE
            gh api "repos/${{ github.repository }}/releases/assets/$ASSET_ID" -X PATCH -f name='AZprose_intel.dmg'
          fi

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --draft=false
