version: 2
updates:
  # npm/bun deps (frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "codemirror"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"

  # rust deps (tauri shell)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "rust"

  # github actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"
