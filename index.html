<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>AZprose</title>

    <style>
      /* Boot screen — painted before any JS bundle loads */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.28s ease;
        background: #1e1e2e;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot-track {
        width: 200px;
        height: 2px;
        border-radius: 2px;
        background: rgba(255,255,255,0.12);
        overflow: hidden;
      }
      #boot-fill {
        height: 100%;
        width: 45%;
        border-radius: 2px;
        background: rgba(255,255,255,0.36);
        animation: boot-slide 1.15s cubic-bezier(0.4, 0, 0.55, 1) infinite;
      }
      @keyframes boot-slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(260%);  }
      }
    </style>

    <script>
      window.MathJax = {
        startup: { typeset: false },
        options: {
          enableSpeech: false,
          enableBraille: false,
          enableEnrichment: false,
          menuOptions: { settings: { enrich: false, speech: false, braille: false } },
        },
      };
    </script>
  </head>
  <body>
    <!-- Boot screen lives outside #root, painted before Svelte mounts.
         The coloring script must come AFTER this div so getElementById works. -->
    <div id="boot">
      <div id="boot-track">
        <div id="boot-fill"></div>
      </div>
    </div>

    <script>
      /* Runs synchronously right after #boot is parsed: colors it from the
         persisted theme before a single byte of the app bundle executes. */
      (function () {
        var BG = {
          latte:       '#eff1f5',
          mono:        '#ffffff',
          'mono-dark': '#111111',
          frappe:      '#303446',
          macchiato:   '#24273a',
          mocha:       '#1e1e2e',
          'skarline-fleet-dark':   '#18191B',
          'skarline-fleet-purple': '#1C1827',
          'skarline-fleet-light':  '#ffffff',
          'skarline-xcode-dark':   '#292a30',
          'skarline-xcode-light':  '#ffffff',
          // crafted catalog
          'andromeeda': '#23262E',
          'ayu-dark': '#10141c',
          'ayu-mirage': '#242936',
          'dracula': '#282A36',
          'dracula-soft': '#282A36',
          'everforest-dark': '#2d353b',
          'everforest-light': '#fdf6e3',
          'github-dark': '#24292e',
          'github-dark-default': '#0d1117',
          'github-dark-dimmed': '#22272e',
          'github-dark-high-contrast': '#0a0c10',
          'github-light': '#fff',
          'github-light-default': '#ffffff',
          'github-light-high-contrast': '#ffffff',
          'gruvbox-dark-hard': '#1d2021',
          'gruvbox-dark-medium': '#282828',
          'gruvbox-dark-soft': '#32302f',
          'gruvbox-light-hard': '#f9f5d7',
          'gruvbox-light-medium': '#fbf1c7',
          'gruvbox-light-soft': '#f2e5bc',
          'horizon-bright': '#FDF0ED',
          'houston': '#17191e',
          'kanagawa-dragon': '#181616',
          'kanagawa-lotus': '#F2ECBC',
          'kanagawa-wave': '#1F1F28',
          'laserwave': '#27212e',
          'material-theme': '#263238',
          'material-theme-darker': '#212121',
          'material-theme-ocean': '#0F111A',
          'material-theme-palenight': '#292D3E',
          'min-light': '#ffffff',
          'monokai': '#272822',
          'night-owl': '#011627',
          'night-owl-light': '#FBFBFB',
          'nord': '#2e3440',
          'one-dark-pro': '#282c34',
          'one-light': '#FAFAFA',
          'plastic': '#21252B',
          'poimandres': '#1b1e28',
          'rose-pine': '#191724',
          'rose-pine-dawn': '#faf4ed',
          'rose-pine-moon': '#232136',
          'slack-ochin': '#FFF',
          'snazzy-light': '#FAFBFC',
          'solarized-dark': '#002B36',
          'solarized-light': '#FDF6E3',
          'tokyo-night': '#1a1b26',
          'vitesse-black': '#000',
          'vitesse-dark': '#121212',
          'vitesse-light': '#ffffff',
          'skarline-xcode-bare': '#ffffff',
          'skarline-xcode-basic': '#ffffff',
          'skarline-xcode-civic': '#292b36',
          'skarline-xcode-classic-dark': '#292a30',
          'skarline-xcode-classic-darker': '#292a30',
          'skarline-xcode-classic-light': '#ffffff',
          'skarline-xcode-default-darker': '#292a30',
          'skarline-xcode-dusk': '#282b35',
          'skarline-xcode-high-contrast-dark': '#1f1f24',
          'skarline-xcode-high-contrast-darker': '#1f1f24',
          'skarline-xcode-high-contrast-light': '#ffffff',
          'skarline-xcode-low-key': '#ffffff',
          'skarline-xcode-midnight': '#000000',
          'skarline-xcode-presentation-dark': '#202025',
          'skarline-xcode-presentation-darker': '#202025',
          'skarline-xcode-presentation-light': '#ffffff',
          'skarline-xcode-spartan': '#ffffff',
          'skarline-xcode-sunset': '#fffcea',
        };
        var LIGHT = {
          latte: 1, mono: 1, 'skarline-fleet-light': 1, 'skarline-xcode-light': 1,
          'everforest-light': 1, 'github-light': 1, 'github-light-default': 1,
          'github-light-high-contrast': 1, 'gruvbox-light-hard': 1,
          'gruvbox-light-medium': 1, 'gruvbox-light-soft': 1, 'horizon-bright': 1,
          'kanagawa-lotus': 1, 'min-light': 1, 'night-owl-light': 1, 'one-light': 1,
          'rose-pine-dawn': 1, 'slack-ochin': 1, 'snazzy-light': 1,
          'solarized-light': 1, 'vitesse-light': 1, 'skarline-xcode-bare': 1,
          'skarline-xcode-basic': 1, 'skarline-xcode-classic-light': 1,
          'skarline-xcode-high-contrast-light': 1, 'skarline-xcode-low-key': 1,
          'skarline-xcode-presentation-light': 1, 'skarline-xcode-spartan': 1,
          'skarline-xcode-sunset': 1,
        };
        var t = '';
        try { t = localStorage.getItem('mdview.theme') || ''; } catch (e) {}
        if (t === 'system' || !BG[t]) {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'mocha' : 'latte';
        }
        var light = !!LIGHT[t];
        document.getElementById('boot').style.background       = BG[t];
        document.getElementById('boot-track').style.background = light ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.12)';
        document.getElementById('boot-fill').style.background  = light ? 'rgba(0,0,0,0.28)'  : 'rgba(255,255,255,0.36)';
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
