<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>AZprose</title>

    <style>
      /* Boot screen — painted before any JS bundle loads */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.28s ease;
        background: #1e1e2e;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot-track {
        width: 200px;
        height: 2px;
        border-radius: 2px;
        background: rgba(255,255,255,0.12);
        overflow: hidden;
      }
      #boot-fill {
        height: 100%;
        width: 45%;
        border-radius: 2px;
        background: rgba(255,255,255,0.36);
        animation: boot-slide 1.15s cubic-bezier(0.4, 0, 0.55, 1) infinite;
      }
      @keyframes boot-slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(260%);  }
      }
    </style>

    <script>
      window.MathJax = {
        startup: { typeset: false },
        options: {
          enableSpeech: false,
          enableBraille: false,
          enableEnrichment: false,
          menuOptions: { settings: { enrich: false, speech: false, braille: false } },
        },
      };
    </script>
  </head>
  <body>
    <!-- Boot screen lives outside #root, painted before Svelte mounts.
         The coloring script must come AFTER this div so getElementById works. -->
    <div id="boot">
      <div id="boot-track">
        <div id="boot-fill"></div>
      </div>
    </div>

    <script>
      /* Runs synchronously right after #boot is parsed: colors it from the
         persisted theme before a single byte of the app bundle executes. */
      (function () {
        var BG = {
          latte:       '#eff1f5',
          mono:        '#ffffff',
          'mono-dark': '#111111',
          frappe:      '#303446',
          macchiato:   '#24273a',
          matcha:      '#f7f4e9',
          mocha:       '#1e1e2e',
          kanagawa:    '#1f1f28',
          ayu:         '#1f2430',
          'rose-pine': '#191724',
          claude:      '#f5f4ed',
          codex:       '#0f0f0f',
          gemini:      '#f6f8ff',
          cursor:      '#14120b',
        };
        var LIGHT = { latte: 1, mono: 1, matcha: 1, claude: 1, gemini: 1 };
        var t = '';
        try { t = localStorage.getItem('mdview.theme') || ''; } catch (e) {}
        if (t === 'system' || !BG[t]) {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'mocha' : 'latte';
        }
        var light = !!LIGHT[t];
        document.getElementById('boot').style.background       = BG[t];
        document.getElementById('boot-track').style.background = light ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.12)';
        document.getElementById('boot-fill').style.background  = light ? 'rgba(0,0,0,0.28)'  : 'rgba(255,255,255,0.36)';
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
